<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies!</title>
  <link rel="stylesheet" href="edit.css" />
</head>

<body>
<form id="editForm">
  <input type="hidden" id="imdbID" required/>
  <div id="titleDiv">
    <label for="Title">Title</label>
    <input type="text" id="Title" required/>
  </div>
  <div id="releaseDiv">
    <label for="Released">Released</label>
    <input type="text" id="Released" required/>
  </div>
  <div id="runtimeDiv">
    <label for="Runtime">Runtime</label>
    <input type="number" id="Runtime" required/>
  </div>
  <div id="genresDiv">
    <label for="Genres">Genres</label>
    <select id="Genres" multiple required size="8"></select>
  </div>
  <div id="directorsDiv">
    <label for="Directors">Directors</label>
    <input type="text" id="Directors" required/>
  </div>
  <div id="writersDiv">
    <label for="Writers">Writers</label>
    <input type="text" id="Writers" required/>
  </div>
  <div id="actorsDiv">
    <label for="Actors">Actors</label>
    <input type="text" id="Actors" required/>
  </div>
  <div id="plotDiv">
    <label for="Plot">Plot</label>
    <textarea id="Plot" rows="5" required></textarea>
  </div>
  <div id="posterDiv">
    <label for="Poster">Poster</label>
    <input type="url" id="Poster" required/>
  </div>
  <div id="metascoreDiv">
    <label for="Metascore">Metascore</label>
    <input type="number" id="Metascore" required/>

  </div>
  <div id="imdbRatingDiv">
    <label for="imdbRating">IMDb Rating</label>
    <input type="number" id="imdbRating" required/>
  </div>
  <button type="button" id="saveButton" onclick=putMovie()>Save</button>
  <button type="button" id="cancelButton" onclick=location.href="index.html">Cancel</button>
</form>
<script src="edit.js"></script>   <!-- needs to be at the very bottom of the body so that the html structure loads first before the logic of the js can be applied -->
</body>
</html>
